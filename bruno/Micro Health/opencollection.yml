opencollection: 1.0.0

info:
  name: Micro Health
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  auth:
    type: bearer
    token: "{{access_token}}"
  scripts:
    - type: before-request
      code: |-
        const expiresAt = bru.getEnvVar("token_expires_at")

        if (!expiresAt || Date.now() > Number(expiresAt)) {
          const axios = require("axios")
          const keycloakUrl = bru.getEnvVar("keycloak_url")
          const realm = bru.getEnvVar("realm")
          const clientId = bru.getEnvVar("client_id")
          const clientSecret = bru.getEnvVar("client_secret")

          const buildPasswordBody = () => {
            const username = bru.getEnvVar("username")
            const password = bru.getEnvVar("password")
            return [
              "grant_type=password",
              `client_id=${clientId}`,
              `client_secret=${clientSecret}`,
              `username=${username}`,
              `password=${password}`,
            ].join("&")
          }

          const refreshToken = bru.getEnvVar("refresh_token")
          const body = refreshToken
            ? [
                "grant_type=refresh_token",
                `client_id=${clientId}`,
                `client_secret=${clientSecret}`,
                `refresh_token=${refreshToken}`,
              ].join("&")
            : buildPasswordBody()

          const tokenUrl = `${keycloakUrl}/realms/${realm}/protocol/openid-connect/token`
          const headers = { "Content-Type": "application/x-www-form-urlencoded" }

          try {
            const { data } = await axios.post(tokenUrl, body, { headers })
            bru.setEnvVar("access_token", data.access_token)
            bru.setEnvVar("refresh_token", data.refresh_token)
            bru.setEnvVar("token_expires_at", Date.now() + (data.expires_in - 30) * 1000)
          } catch (e) {
            const isInvalidGrant = e?.response?.data?.error === "invalid_grant"
            if (refreshToken && isInvalidGrant) {
              // Refresh token is stale — clear it and retry with password grant
              bru.setEnvVar("refresh_token", "")
              bru.setEnvVar("token_expires_at", "")
              try {
                const { data } = await axios.post(tokenUrl, buildPasswordBody(), { headers })
                bru.setEnvVar("access_token", data.access_token)
                bru.setEnvVar("refresh_token", data.refresh_token)
                bru.setEnvVar("token_expires_at", Date.now() + (data.expires_in - 30) * 1000)
              } catch (e2) {
                console.error("Password grant also failed:", e2)
              }
            } else {
              console.error(e)
            }
          }
        }
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
    openapi:
      - sourceUrl: http://localhost:5000/v3/api-docs
