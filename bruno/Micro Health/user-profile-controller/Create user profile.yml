info:
  name: Create user profile
  type: http
  seq: 3
  tags:
    - user-profile-controller

http:
  method: POST
  url: "{{baseUrl}}/{{service}}/profiles/v1/"
  body:
    type: json
    data: |-
      {
        "height": 180,
        "weight": 90,
        "birthday": "1970-01-01",
        "gender": "MALE"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/profiles"
      method: POST
      body:
        type: json
        data: |-
          {
            "height": 0,
            "weight": 0,
            "age": 0,
            "gender": "MALE"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "userName": "",
            "height": 0,
            "weight": 0,
            "age": 0,
            "gender": "MALE"
          }
