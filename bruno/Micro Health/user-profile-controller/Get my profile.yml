info:
  name: Get my profile
  type: http
  seq: 1
  tags:
    - user-profile-controller

http:
  method: GET
  url: "{{baseUrl}}/{{service}}/profiles/v1/me"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/profiles/me"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "userName": "",
            "height": 0,
            "weight": 0,
            "age": 0,
            "gender": "MALE"
          }
