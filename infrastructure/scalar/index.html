<!doctype html>
<html>
  <head>
    <title>API Explorer</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>
  <body>
    <div id="app"></div>

    <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>

    <script>
      const bearerScheme = {
        type: "http",
        scheme: "bearer",
        bearerFormat: "JWT",
      }

      async function fetchToken() {
        const res = await fetch("http://localhost/auth/token", {
          method: "POST",
          body: new URLSearchParams({
            grant_type: "password",
            client_id: "${SCALAR_CLIENT_ID}",
            client_secret: "${SCALAR_CLIENT_SECRET}",
            username: "${SCALAR_USERNAME}",
            password: "${SCALAR_PASSWORD}",
          }),
        })
        const data = await res.json()
        return data.access_token
      }

      function buildAuthConfig(token) {
        return {
          preferredSecurityScheme: "bearerAuth",
          securitySchemes: {
            bearerAuth: { token },
          },
        }
      }

      function injectSecurity(spec) {
        spec.components = spec.components ?? {}
        spec.components.securitySchemes = { bearerAuth: bearerScheme }
        spec.security = [{ bearerAuth: [] }]
        return spec
      }

      Promise.all([
        fetch("http://localhost/api/user-service/openapi.json").then(r =>
          r.json(),
        ),
        fetch("http://localhost/api/workout-service/openapi.json").then(r =>
          r.json(),
        ),
        fetchToken(),
      ]).then(([userSpec, workoutSpec, token]) => {
        const app = Scalar.createApiReference("#app", [
          {
            sources: [
              { content: injectSecurity(userSpec), title: "User Service" },
            ],
            servers: [
              {
                url: "http://localhost/api/user-service",
                description: "Gateway",
              },
            ],
            authentication: buildAuthConfig(token),
          },
          {
            sources: [
              {
                content: injectSecurity(workoutSpec),
                title: "Workout Service",
              },
            ],
            servers: [
              {
                url: "http://localhost/api/workout-service",
                description: "Gateway",
              },
            ],
            authentication: buildAuthConfig(token),
          },
        ])

        setInterval(
          async () => {
            const newToken = await fetchToken()
            const auth = buildAuthConfig(newToken)
            app.updateConfiguration([
              { authentication: auth },
              { authentication: auth },
            ])
          },
          2 * 60 * 1000,
        )
      })
    </script>
  </body>
</html>
