services:
  keycloak-db:
    image: postgres:18.3
    restart: unless-stopped
    volumes:
      - keycloak_data:/var/lib/postgresql
    env_file:
      - ./.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - apisix-net

  keycloak:
    build: .
    restart: unless-stopped
    command: start --optimized --import-realm --http-enabled=true --hostname=http://localhost:8080
    env_file:
      - ./.env
    volumes:
      - ./realm-export.json:/opt/keycloak/data/import/realm-export.json
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - apisix-net
    ports:
      - "8080:8080"
    healthcheck:
      test: ['CMD-SHELL', "{ printf 'HEAD /health/ready HTTP/1.0\r\n\r\n' >&0; grep 'HTTP/1.0 200'; } 0<>/dev/tcp/localhost/9000"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  keycloak_data: