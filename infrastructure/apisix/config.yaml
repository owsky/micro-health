apisix:
  node_listen: 9080
  admin_key:
    - name: "admin"
      key: "${{APISIX_ADMIN_KEY}}"
      role: admin

deployment:
  role: data_plane
  role_data_plane:
    config_provider: yaml

conf_listen:
  interval: 10s

nginx_config:
  envs:
    - APISIX_ADMIN_KEY
    - BACKEND_CLIENT_ID
    - BACKEND_CLIENT_SECRET
    - REALM_NAME
    - SESSION_SECRET
    - USER_SERVICE_NODE
    - WORKOUT_SERVICE_NODE
    - KEYCLOAK_NODE
